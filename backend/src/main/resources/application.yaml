spring:
  application:
    name: backend
  # OAuth2 Google login — DEFERRED until GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
  # are real values in .env (Spring rejects an empty client-id at startup).
  # Re-enable this whole block then.
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         google:
  #           client-id: ${GOOGLE_CLIENT_ID}
  #           client-secret: ${GOOGLE_CLIENT_SECRET}
  #           scope: [ email, profile ]
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
app:
  s3:
    bucket: ${S3_BUCKET}
  aws:
    region: ${AWS_REGION:ap-northeast-2}