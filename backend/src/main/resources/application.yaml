spring:
  application:
    name: backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 128MB
  # OAuth2 Google login — DEFERRED until GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
  # are real values in .env (Spring rejects an empty client-id at startup).
  # Re-enable this whole block then.
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         google:
  #           client-id: ${GOOGLE_CLIENT_ID}
  #           client-secret: ${GOOGLE_CLIENT_SECRET}
  #           scope: [ email, profile ]
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
app:
  s3:
    bucket: ${S3_BUCKET}
  aws:
    region: ${AWS_REGION:ap-northeast-2}
  ingest:
    enabled: true
    poll-interval-ms: 2000
    batch-size: 5
    ownership-ttl-ms: 60000
    retry-backoff-ms: 5000
  storage:
    quota-bytes: 107374182400