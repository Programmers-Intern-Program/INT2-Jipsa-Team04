[project]
name = "jipsa-rag"
version = "0.1.0"
description = "FastAPI service for the Jipsa Local RAG pipeline."
readme = "README.md"
authors = [
    { name = "안수현", email = "soxyxs4996@gmail.com" }
]
requires-python = ">=3.12,<3.13"
dependencies = [
    "alembic>=1.18.5",
    "asyncmy>=0.2,<1.0",
    "boto3>=1.43.46",
    "fastapi[standard]>=0.139.0",
    "pydantic-settings>=2.14.2",
    "python-json-logger>=4.1.0",
    "sqlalchemy[asyncio]>=2.0,<2.1",
    "tenacity>=9.1.4",
    "uvicorn[standard]>=0.35,<1.0",
]

[project.scripts]
jipsa-rag = "jipsa_rag:main"

[build-system]
requires = ["uv_build>=0.11.28,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "boto3-stubs[s3]>=1.43.46",
    "httpx>=0.28.1",
    "httpx2>=2.0.0",
    "mypy>=2.2.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.21",
]

[tool.pytest.ini_options]
addopts = "-ra -q --strict-config --strict-markers"
asyncio_mode = "strict"
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
    "SIM",
    "RUF",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
mypy_path = "src"
strict = true
show_error_codes = true
pretty = true
