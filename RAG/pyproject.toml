[project]
name = "jipsa-rag"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "안수현", email = "soxyxs4996@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.18.5",
    "asyncmy>=0.2.11",
    "boto3>=1.43.46",
    "fastapi[standard]>=0.139.0",
    "pydantic-settings>=2.14.2",
    "python-json-logger>=4.1.0",
    "sqlalchemy>=2.0.51",
    "tenacity>=9.1.4",
]

[project.scripts]
jipsa-rag = "jipsa_rag:main"

[build-system]
requires = ["uv_build>=0.11.28,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "boto3-stubs[s3]>=1.43.46",
    "httpx>=0.28.1",
    "mypy>=2.2.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.21",
]
